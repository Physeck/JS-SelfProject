<html lang="en">

    <link rel="stylesheet" href="public/style.css">

<body class="hero">
    <div class="header-container">
        <a href="https://github.com/Physeck/JS-SelfProject" class="text-deco-none text-color" id="mainHeader"></a>

    <h2>Number Guess Game!!</h2>
    <p>Ranging 1-100, with only 10 Attempts!</p>
    <p>It'll tell if its too high or too low</p>
    <div class="container">
        <p>Number</p>
        <input id="guess" type="number" min="0" max="100">
        <button onclick="checkNum()">Submit</button>
        <button onclick="reset()">Reset</button>

    <p>Last Inputted Number:  <span class="last-num"></span></p>
    <span class="message"></span>
