<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam JS-19</title>
    <link rel="stylesheet" href="public/style.css">
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12" defer></script>
    <script src="public/main.js" defer></script>
</head>

<body class="hero">
    <div class="header-container">
        <a href="https://github.com/Physeck/JS-SelfProject" class="text-deco-none text-color" id="mainHeader"></a>
    </div>
    <div class="photobooth">
        <div class="controls">
            <button onclick="takePhoto()">Take Photo</button>
            <div class="rgb">
                <label for="rmin">Red Min:</label>
                <input type="range" min="0" max="255" name="rmin">
                <label for="rmin">Red Max:</label>
                <input type="range" min="0" max="255" name="rmax">

                <br>

                <label for="gmin">Green Min:</label>
                <input type="range" min="0" max="255" name="gmin">
                <label for="gmin">Green Max:</label>
                <input type="range" min="0" max="255" name="gmax">

                <br>

                <label for="bmin">Blue Min:</label>
                <input type="range" min="0" max="255" name="bmin">
                <label for="bmin">Blue Max:</label>
                <input type="range" min="0" max="255" name="bmax">
            </div>
        </div>
        <canvas class="photo"></canvas>
        <video class="player" hidden></video>
        <div class="strip"></div>
    </div>

    <audio src="./public/audio/snap.mp3" class="snap" hidden></audio>
</body>

</html>
