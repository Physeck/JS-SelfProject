<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer JS-28</title>
    <link rel="stylesheet" href="public/style.css">
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12" defer></script>
    <script src="public/main.js" defer></script>
</head>

<body class="hero">
    <div class="header-container">
        <a href="https://github.com/Physeck/JS-SelfProject" class="text-deco-none text-color" id="mainHeader"></a>
    </div>

    <div class="timer-container">
        
        <span class="timer">00:00:00</span>
        <p class="timer-remind">Will be back at <span class="time-then">00.00</span></p>
        <div class="timer-controls">
            <button data-time="30" class="timer-btn">30 Sec</button>
            <button data-time="300" class="timer-btn">5 Min</button>
            <button data-time="600" class="timer-btn">10 Min</button>
            <button data-time="1800" class="timer-btn">30 Min</button>
            <form name="minutes_form" id="timeForm">
                <input type="text" name="minutes" placeholder="Enter number minutes">
            </form>
        </div>
    </div>

</body>

</html>
